name: sofon

networks:
  sofon-internal:
    name: sofon-internal
    driver: bridge

volumes:
  postgres_data:
    name: sofon-postgres-data
  redis_data:
    name: sofon-redis-data
  caddy_data:
    name: sofon-caddy-data
  caddy_config:
    name: sofon-caddy-config

services:
  caddy:
    image: caddy:2.10-alpine
    container_name: sofon-caddy
    ports:
      - "${SOFON_HTTP_PORT:-80}:80"
      - "${SOFON_HTTPS_PORT:-443}:443"
    volumes:
      - ../Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started
    networks:
      - sofon-internal
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: sofon-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sofon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-sofon}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sofon-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sofon} -d ${POSTGRES_DB:-sofon}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: sofon-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - sofon-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: ${SOFON_API_IMAGE:?SOFON_API_IMAGE is required}
    container_name: sofon-migrate
    command:
      [
        "./goose",
        "-dir",
        "./migration",
        "postgres",
        "postgres://${POSTGRES_USER:-sofon}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sofon}?sslmode=disable",
        "up"
      ]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sofon-internal
    restart: "no"
    volumes:
      - ../config/config.yaml:/app/config.yaml:ro

  api:
    image: ${SOFON_API_IMAGE:?SOFON_API_IMAGE is required}
    container_name: sofon-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - sofon-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ../config/config.yaml:/app/config.yaml:ro

  web:
    image: ${SOFON_WEB_IMAGE:?SOFON_WEB_IMAGE is required}
    container_name: sofon-web
    depends_on:
      api:
        condition: service_healthy
    networks:
      - sofon-internal
    restart: unless-stopped
